<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" width="100%" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E1437" />
      <stop offset="50%" stop-color="#111B3D" />
      <stop offset="100%" stop-color="#143F40" />
    </linearGradient>
    <style>
      @keyframes float-color {
        0% { filter: hue-rotate(0deg); }
        100% { filter: hue-rotate(360deg); }
      }
      @keyframes float-wave {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
        100% { transform: translateY(0px); }
      }
      .bg {
        animation: float-color 5s linear infinite;
      }
      .wave-group {
        animation: float-wave 5s ease-in-out infinite;
      }
      .name {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 55px;
        font-weight: 800;
        fill: #f8fafc;
        text-anchor: middle;
      }
      .desc {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 22px;
        font-weight: 500;
        fill: #94a3b8;
        text-anchor: middle;
      }
    </style>
  </defs>
  
  <!-- Add a solid dark background just behind everything to prevent gaps during floating -->
  <rect width="100%" height="150" fill="#0b1120" />
  
  <g class="wave-group">
    <path d="M0,-20 L1000,-20 L1000,130 C750,210 250,50 0,130 Z" fill="url(#grad)" class="bg" />
    
    <text x="50%" y="45%" class="name" dominant-baseline="middle">WilsonRamropui</text>
    <text x="50%" y="75%" class="desc" dominant-baseline="middle">Software Engineer | Creator of UltraFastSharing</text>
  </g>
</svg>
